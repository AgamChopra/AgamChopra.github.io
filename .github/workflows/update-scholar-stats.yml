name: Update Google Scholar stats

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch Scholar stats
        run: python scripts/update_scholar_stats.py

      - name: Commit changes
        run: |
          if git diff --quiet -- scholar-stats.json; then
            echo "Scholar stats are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar-stats.json
          git commit -m "Update Google Scholar stats"
          git push
